name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

env:
  BUILD_TYPE: Release

jobs:
  # ── 构建 + 单元测试（编译器矩阵） ──────────────────
  build-and-test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc-12,   cxx: g++-12,   pkg: g++-12 }
          - { cc: clang-14, cxx: clang++-14, pkg: clang-14 }
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ${{ matrix.compiler.pkg }}

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ hashFiles('CMakeLists.txt') }}-${{ env.BUILD_TYPE }}-${{ matrix.compiler.cc }}
          restore-keys: |
            deps-${{ hashFiles('CMakeLists.txt') }}-
            deps-

      - name: Configure CMake
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

  # ── Docker 构建验证 ────────────────────────────────
  docker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        # GitHub Actions runner 在海外，直连 GitHub 最快；覆盖 Dockerfile 默认的
        # 国内代理 GH_PROXY=ghproxy.net 为空值，避免绕道代理变慢/失败。
        run: docker build -t backer --build-arg GH_PROXY= .

      - name: Verify binary exists in image
        run: |
          docker run --rm --entrypoint /usr/bin/ls backer -la /usr/local/bin/backer

